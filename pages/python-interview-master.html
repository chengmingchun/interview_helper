    .section{margin-bottom:22px}.section-head{display:flex;align-items:end;justify-content:space-between;gap:16px;margin-bottom:12px}.section-head h2{margin:0;font-size:30px;letter-spacing:-.03em}.section-head p{margin:0;color:var(--muted);font-size:14px}.cards{display:grid;gap:14px}.card{border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.95);overflow:hidden;box-shadow:0 8px 24px rgba(48,76,112,.05)}.card summary{list-style:none;cursor:pointer;padding:20px 22px}.card summary::-webkit-details-marker{display:none}.summary-row{display:flex;align-items:flex-start;justify-content:space-between;gap:18px}.card h3{margin:0;font-size:22px}.badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}.badge{padding:4px 8px;border-radius:999px;background:var(--soft);color:var(--accent);font-size:11px;font-weight:800}.level-deep{background:#f8e9cc;color:#8a5b00}.level-core{background:#e8f4ec;color:#246b43}.chev{font-size:22px;color:var(--accent);transition:transform .2s}.card[open] .chev{transform:rotate(90deg)}.body{padding:0 22px 22px;border-top:1px solid var(--line)}.body-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}.box{padding:15px;border:1px solid var(--line);border-radius:15px;background:var(--soft)}.box h4{margin:0 0 8px}.box p,.box li{color:var(--muted)}.box li{margin:6px 0}.full{grid-column:1/-1}.interview{border-left:4px solid var(--accent);background:#f3f8fd}.trap{border-left:4px solid var(--danger);background:#fff5f5}pre{margin:0;padding:15px;border-radius:14px;background:#141b26;color:#dfe8f2;overflow:auto;font:13px/1.55 ui-monospace,SFMono-Regular,Consolas,monospace}.master-row{display:flex;justify-content:flex-end;margin-top:14px}.master-btn{padding:9px 13px;border:1px solid var(--line);border-radius:11px;background:#fff;cursor:pointer}.master-btn.done{color:#fff;background:var(--ok);border-color:var(--ok)}
    .flash-wrap{display:grid;grid-template-columns:1fr 1fr;gap:16px}.flashcard{min-height:230px;perspective:1000px;cursor:pointer}.flash-inner{position:relative;width:100%;height:100%;min-height:230px;transition:transform .55s;transform-style:preserve-3d}.flashcard.flipped .flash-inner{transform:rotateY(180deg)}.face{position:absolute;inset:0;padding:24px;border:1px solid var(--line);border-radius:20px;background:#fff;box-shadow:var(--shadow);backface-visibility:hidden}.backface{transform:rotateY(180deg);background:linear-gradient(145deg,#edf5fc,#fff)}.face small{color:var(--muted)}.face h3{margin:12px 0}.flash-actions{display:flex;gap:8px;margin-top:12px}.flash-actions button{padding:8px 11px;border:1px solid var(--line);border-radius:10px;background:#fff;cursor:pointer}
    .quiz-card{padding:22px;border:1px solid var(--line);border-radius:20px;background:#fff}.option{display:block;width:100%;margin:8px 0;padding:11px 13px;text-align:left;border:1px solid var(--line);border-radius:12px;background:#fff;cursor:pointer}.option.correct{border-color:var(--ok);background:#ecf8f1}.option.wrong{border-color:var(--danger);background:#fff1f1}.explain{display:none;margin-top:10px;color:var(--muted)}.quiz-card.answered .explain{display:block}.empty{display:none;padding:28px;border:1px dashed var(--line);border-radius:18px;text-align:center;color:var(--muted)}

  <section class="hero"><div class="hero-grid"><div><div class="eyebrow">Python Interview Master</div><h1>强化版 Python 八股</h1><p>不是背零散定义，而是从对象模型、作用域、迭代协议、GIL、内存、并发和工程化建立一张完整知识图。每张卡都包含结论、原理、代码、面试表达和易错追问。</p></div><div class="hero-side"><div class="metric"><b id="topicCount">0</b><span>核心知识卡</span></div><div class="metric"><b id="masterCount">0</b><span>已掌握</span></div><div class="metric"><b>3</b><span>学习模式：基础 / 面试 / 深挖</span></div></div></div></section>

<script>
const topics=[
{id:'object',title:'一切皆对象：对象模型与变量绑定',level:'core',tags:['对象模型','引用','id','type'],summary:'Python 变量不是盒子，而是名字绑定到对象；赋值改变的是绑定关系。',points:['对象包含身份、类型和值。','变量名存的是对象引用，不直接存值。','多个变量可指向同一可变对象，修改会相互影响。','is 比较身份，== 比较值。'],code:`a = [1, 2]\nb = a\nc = [1, 2]\nprint(a is b)   # True\nprint(a == c)   # True\nprint(a is c)   # False`,qa:'为什么 Python 的赋值不是拷贝？',answer:'赋值语句只让左侧名字绑定到右侧对象。是否产生新对象取决于右侧表达式本身，而不是赋值动作。',trap:'不要说“变量存对象本身”。更准确是名字绑定到对象。'},
{id:'mutable',title:'可变与不可变：真正影响哈希、共享与线程安全',level:'core',tags:['可变对象','不可变对象','hash'],summary:'可变性描述对象创建后内部值能否原地改变，不等于变量能否重新赋值。',points:['list、dict、set 通常可变；int、str、tuple 通常不可变。','tuple 里若含可变对象，tuple 自身不可变，但内部对象仍可变。','可哈希对象通常要求生命周期内哈希值稳定，因此可变容器一般不可哈希。'],code:`t = ([1, 2], 'x')\nt[0].append(3)\nprint(t)  # ([1, 2, 3], 'x')`,qa:'为什么 list 不能做 dict 的 key？',answer:'dict 依赖哈希值定位桶。list 内容可变，若哈希值随内容变化，会破坏查找稳定性，因此 list 不可哈希。',trap:'不可变不代表绝对线程安全，只代表对象自身不能原地修改。'},
{id:'copy',title:'浅拷贝、深拷贝与嵌套对象',level:'interview',tags:['copy','deepcopy','嵌套对象'],summary:'浅拷贝只复制最外层容器，内部元素仍共享；深拷贝递归复制对象图。',points:['切片、list.copy()、copy.copy() 常见为浅拷贝。','copy.deepcopy() 会维护 memo，避免循环引用无限递归。','深拷贝成本高，工程里更应明确数据所有权。'],code:`import copy\na = [[1], [2]]\nb = copy.copy(a)\nc = copy.deepcopy(a)\na[0].append(9)\nprint(b)  # [[1, 9], [2]]\nprint(c)  # [[1], [2]]`,qa:'deepcopy 为什么不会被循环引用卡死？',answer:'deepcopy 内部使用 memo 字典记录已复制对象的 id，遇到同一对象直接复用副本。',trap:'面试不要只背“浅一层、深所有层”，要说共享关系。'},
{id:'scope',title:'LEGB、闭包与 late binding',level:'interview',tags:['LEGB','闭包','nonlocal'],summary:'名称查找遵循 Local → Enclosing → Global → Builtins；闭包保存自由变量引用。',points:['闭包保存的是变量单元，不一定是创建时的值。','循环中创建 lambda 容易发生 late binding。','可用默认参数冻结当前值。','nonlocal 修改外层函数变量，global 修改模块级变量。'],code:`funcs = [lambda i=i: i for i in range(3)]\nprint([f() for f in funcs])  # [0, 1, 2]`,qa:'闭包为什么常出现 late binding？',answer:'函数执行时才从闭包单元读取变量，循环结束后变量已是最终值。默认参数在函数定义时求值，可冻结当前值。',trap:'默认参数只在定义时计算一次，因此可变默认参数也是坑。'},
{id:'decorator',title:'装饰器：函数对象、闭包与代理调用',level:'interview',tags:['装饰器','functools.wraps','闭包'],summary:'装饰器本质是接收函数并返回新可调用对象，在不改原函数代码的情况下增强行为。',points:['@decorator 等价于 func = decorator(func)。','多层装饰器自下而上应用。','wraps 保留 __name__、__doc__ 等元数据。','带参数装饰器通常是三层函数。'],code:`from functools import wraps\ndef log(fn):\n    @wraps(fn)\n    def wrapper(*args, **kwargs):\n        print('call', fn.__name__)\n        return fn(*args, **kwargs)\n    return wrapper`,qa:'装饰器和 Java 动态代理像吗？',answer:'目标都可实现横切增强，但 Python 装饰器更轻量，直接替换函数或类；Java 动态代理依赖接口/字节码代理和运行时分发。',trap:'忘记 wraps 会让调试、反射和框架注册看到 wrapper 的元数据。'},
{id:'iterator',title:'Iterable、Iterator、Generator 与惰性计算',level:'core',tags:['迭代器','生成器','yield'],summary:'可迭代对象能产生迭代器；迭代器维护遍历状态；生成器是创建迭代器的简洁方式。',points:['iter(x) 获取迭代器，next(it) 推进一步。','迭代器通常一次性消费。','yield 会挂起函数并保存局部状态。','惰性计算节省内存，也能处理无限序列。'],code:`def count_up(n):\n    i = 0\n    while i < n:\n        yield i\n        i += 1`,qa:'生成器为什么省内存？',answer:'它不一次性构造全部结果，只保留当前执行帧和局部状态，按需产生下一个值。',trap:'生成器省内存不代表总是更快，频繁切换和 Python 层循环可能增加开销。'},
{id:'context',title:'上下文管理器与 with 协议',level:'interview',tags:['with','__enter__','__exit__'],summary:'上下文管理器把资源申请和释放绑定，确保异常路径也能清理。',points:['with 调用 __enter__，离开时调用 __exit__。','__exit__ 返回 True 可吞掉异常。','contextlib.contextmanager 可用生成器简化实现。'],code:`from contextlib import contextmanager\n@contextmanager\ndef managed():\n    print('open')\n    try:\n        yield 'resource'\n    finally:\n        print('close')`,qa:'with 为什么能保证资源释放？',answer:'解释器会把进入和退出协议包在受控流程中，即使代码块抛异常，也会调用 __exit__ 或 finally。',trap:'不要在 __exit__ 中无意返回 True，否则异常会被吞掉。'},
{id:'descriptor',title:'描述符、property 与属性访问机制',level:'deep',tags:['descriptor','property','__getattribute__'],summary:'实现 __get__、__set__、__delete__ 的对象可以接管属性访问，是 property、方法绑定、ORM 字段的基础。',points:['数据描述符优先级高于实例字典。','函数对象实现描述符协议，访问实例方法时绑定 self。','property 本质是描述符。'],code:`class Positive:\n    def __set_name__(self, owner, name): self.name=name\n    def __get__(self, obj, owner): return obj.__dict__[self.name]\n    def __set__(self, obj, value):\n        if value <= 0: raise ValueError\n        obj.__dict__[self.name]=value`,qa:'为什么 obj.method 会自动绑定 self？',answer:'类中的函数实现 __get__ 描述符协议，被实例访问时返回 bound method，其中已绑定实例。',trap:'__getattr__ 只在普通查找失败后调用；__getattribute__ 拦截所有属性访问。'},
{id:'memory',title:'引用计数、循环垃圾回收与内存池',level:'interview',tags:['引用计数','GC','循环引用'],summary:'CPython 主要靠引用计数即时回收，再用分代循环 GC 处理循环引用。',points:['引用计数归零时对象通常立即释放。','循环引用会让计数不归零，需要 cyclic GC。','小对象常由 pymalloc 管理，释放对象不等于立刻归还操作系统。','__del__ 会让回收语义更复杂。'],code:`import gc\nprint(gc.get_threshold())\nprint(gc.get_count())`,qa:'为什么进程内存不一定随对象释放下降？',answer:'对象可能归还给 Python 内存池而不是操作系统，后续分配可复用这些 arena/pool。',trap:'不要笼统说 Python 有“垃圾回收器所以不用管内存”。引用生命周期和大对象仍需关注。'},
{id:'gil',title:'GIL：为什么多线程不能加速 CPU 密集任务',level:'interview',tags:['GIL','线程','CPU密集'],summary:'CPython 的 GIL 让同一进程内同一时刻通常只有一个线程执行 Python 字节码。',points:['GIL 主要简化解释器对象内存管理。','I/O 阻塞时线程可释放 GIL，所以多线程适合 I/O 密集。','CPU 密集可用多进程、原生扩展、NumPy 或其他实现。','GIL 不等于代码自动线程安全。'],code:`# I/O 密集：ThreadPoolExecutor\n# CPU 密集：ProcessPoolExecutor`,qa:'有 GIL 为什么还需要锁？',answer:'GIL 只保护解释器级执行，不保证一段业务操作原子，也可能在多个字节码之间切换；共享状态仍需同步。',trap:'不要说“Python 多线程完全没用”。I/O 密集场景非常有用。'},
{id:'asyncio',title:'asyncio、事件循环与协程调度',level:'interview',tags:['asyncio','协程','事件循环'],summary:'asyncio 使用单线程事件循环在 I/O 等待期间切换协程，提升高并发 I/O 吞吐。',points:['async def 返回协程对象，await 挂起当前协程。','事件循环调度就绪任务。','阻塞函数会卡住整个事件循环。','CPU 密集任务应下放线程池/进程池。'],code:`import asyncio\nasync def work(i):\n    await asyncio.sleep(1)\n    return i\nasync def main():\n    print(await asyncio.gather(*(work(i) for i in range(3))))\nasyncio.run(main())`,qa:'协程和线程的区别？',answer:'协程由用户态事件循环协作调度，切换成本低；线程由操作系统抢占调度。协程适合大量 I/O，不能直接并行执行 CPU 密集 Python 字节码。',trap:'async 函数里调用 time.sleep、requests 等阻塞 API 会卡住事件循环。'},
{id:'concurrency',title:'线程、进程、协程怎么选',level:'core',tags:['线程池','进程池','协程'],summary:'选择依据不是“哪个高级”，而是任务是否阻塞、是否 CPU 密集、是否需要共享内存。',points:['I/O 密集且库是同步阻塞：线程池。','I/O 密集且库支持 async：asyncio。','CPU 密集：多进程或原生扩展。','进程隔离强但序列化和进程启动成本更高。'],code:`from concurrent.futures import ThreadPoolExecutor, ProcessPoolExecutor`,qa:'为什么多进程能绕过 GIL？',answer:'每个进程有独立解释器和独立 GIL，可在多个 CPU 核心并行执行。',trap:'多进程传递大对象会产生序列化和复制成本。'},
{id:'dict',title:'dict / set 原理、哈希冲突与复杂度',level:'deep',tags:['dict','set','哈希表'],summary:'dict 和 set 基于哈希表，平均查询 O(1)，但依赖良好哈希分布和扩容策略。',points:['key 必须可哈希且相等对象哈希必须相等。','哈希冲突通过探测解决。','扩容会重新组织表结构。','保持插入顺序是语言层行为，但不是有序映射排序。'],code:`d = {'a': 1}\nprint(hash('a'))\nprint('a' in d)`,qa:'dict 查询为什么不是绝对 O(1)？',answer:'平均 O(1)，极端碰撞或攻击性输入下可能退化；扩容也有摊销成本。',trap:'不要把“保持插入顺序”说成按 key 排序。'},
{id:'meta',title:'类、元类、__new__ 与 __init__',level:'deep',tags:['元类','__new__','__init__'],summary:'类也是对象，默认由 type 创建；__new__ 负责创建实例，__init__ 负责初始化。',points:['调用类时实际经过元类 __call__。','__new__ 返回实例，__init__ 无返回值。','元类适合框架注册、校验和类创建期改造。','普通业务优先用装饰器或 __init_subclass__。'],code:`class Base:\n    def __init_subclass__(cls, **kwargs):\n        super().__init_subclass__(**kwargs)\n        print('register', cls.__name__)`,qa:'什么时候需要元类？',answer:'当需要统一控制“类如何被创建”时，例如 ORM 模型字段收集、插件注册、类级约束。普通实例逻辑不应滥用元类。',trap:'把能用普通函数解决的问题写成元类，会显著增加理解成本。'},
{id:'performance',title:'Python 性能优化与工程化答法',level:'interview',tags:['性能','profiling','工程化'],summary:'先测量再优化；优先算法、I/O、数据库和批处理，再考虑解释器层微优化。',points:['使用 cProfile、py-spy、line_profiler 定位热点。','避免 Python 层逐元素循环，优先向量化或批处理。','数据库减少 N+1，合理使用连接池和批量操作。','缓存要明确一致性、淘汰和击穿策略。'],code:`python -m cProfile -s cumulative app.py`,qa:'你会怎么优化一个慢 Python 接口？',answer:'先拆网络、数据库、序列化、业务计算耗时，再用 profiling 定位热点；优先减少 I/O 次数和算法复杂度，最后再做局部实现优化。',trap:'不要一上来就换语言或加缓存，先有数据证据。'}
];
const flashcards=topics.map(t=>({q:t.qa,a:t.answer,tip:t.summary}));
const quiz=[
{q:'关于 Python 赋值，哪项正确？',opts:['赋值默认深拷贝','赋值让名字绑定到对象','变量直接存储对象内容','所有赋值都会创建新对象'],ans:1,ex:'Python 赋值主要改变名称绑定关系。'},
{q:'为什么可变默认参数危险？',opts:['每次调用都重新创建','只在函数定义时创建一次','会触发 GIL','不能被垃圾回收'],ans:1,ex:'默认参数在函数定义时求值，多次调用会共享同一对象。'},
{q:'CPU 密集型 Python 任务更适合？',opts:['更多线程','asyncio','多进程或原生扩展','增加生成器'],ans:2,ex:'多进程有独立解释器和 GIL，可并行使用多核。'},
{q:'生成器省内存的主要原因？',opts:['使用 C 编写','结果自动压缩','按需生成且仅保存执行状态','没有局部变量'],ans:2,ex:'生成器保留执行帧，逐个产生值。'},
{q:'with 协议退出时调用？',opts:['__get__','__iter__','__exit__','__delattr__'],ans:2,ex:'上下文管理器通过 __enter__ / __exit__ 管理资源。'},
{q:'GIL 意味着什么？',opts:['所有 Python 代码线程安全','同进程通常只有一个线程执行 Python 字节码','不能创建线程','多进程也受同一个 GIL'],ans:1,ex:'GIL 不保证业务线程安全，也不影响独立进程。'},
{q:'dict key 的核心要求？',opts:['必须是字符串','必须可哈希且哈希稳定','必须不可比较','必须是数字'],ans:1,ex:'哈希表依赖稳定哈希值和相等性契约。'},
{q:'asyncio 最怕什么？',opts:['大量 await','非阻塞 I/O','阻塞调用卡住事件循环','单线程'],ans:2,ex:'阻塞函数会让整个事件循环停止调度。'}
];
let active='all',flashIndex=0;const key='python-mastered-v1';let mastered=new Set(JSON.parse(localStorage.getItem(key)||'[]'));
function levelName(x){return x==='core'?'核心必会':x==='interview'?'面试高频':'深入追问'}
function render(){const kw=document.getElementById('searchInput').value.trim().toLowerCase();const rows=topics.filter(t=>(active==='all'||t.level===active)&&[t.title,t.summary,t.qa,...t.tags].join(' ').toLowerCase().includes(kw));document.getElementById('cards').innerHTML=rows.map(t=>`<details class="card" id="${t.id}"><summary><div class="summary-row"><div><h3>${t.title}</h3><div class="badges"><span class="badge ${t.level==='deep'?'level-deep':t.level==='core'?'level-core':''}">${levelName(t.level)}</span>${t.tags.map(x=>`<span class="badge">${x}</span>`).join('')}</div></div><span class="chev">›</span></div><p>${t.summary}</p></summary><div class="body"><div class="body-grid"><div class="box"><h4>核心原理</h4><ul>${t.points.map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="box"><h4>代码直觉</h4><pre>${escapeHtml(t.code)}</pre></div><div class="box full interview"><h4>面试官：${t.qa}</h4><p>${t.answer}</p></div><div class="box full trap"><h4>易错点</h4><p>${t.trap}</p></div></div><div class="master-row"><button class="master-btn ${mastered.has(t.id)?'done':''}" data-id="${t.id}">${mastered.has(t.id)?'✓ 已掌握':'标记掌握'}</button></div></div></details>`).join('');document.getElementById('resultCount').textContent=`${rows.length} 张知识卡`;document.getElementById('empty').style.display=rows.length?'none':'block';bindMaster();updateStats()}
function escapeHtml(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function bindMaster(){document.querySelectorAll('.master-btn').forEach(btn=>btn.onclick=()=>{const id=btn.dataset.id;mastered.has(id)?mastered.delete(id):mastered.add(id);localStorage.setItem(key,JSON.stringify([...mastered]));render()})}
function updateStats(){document.getElementById('topicCount').textContent=topics.length;document.getElementById('masterCount').textContent=mastered.size;const p=Math.round(mastered.size/topics.length*100);document.getElementById('progressText').textContent=`掌握进度 ${p}%`}
function renderToc(){document.getElementById('toc').innerHTML=topics.map(t=>`<a href="#${t.id}">${t.title}</a>`).join('')}
function renderFlash(){const f=flashcards[flashIndex];document.getElementById('flashQ').textContent=f.q;document.getElementById('flashA').textContent=f.a;document.getElementById('flashTip').textContent=f.tip;document.getElementById('flashIndex').textContent=`${flashIndex+1} / ${flashcards.length}`;document.getElementById('flashcard').classList.remove('flipped')}
function renderQuiz(){document.getElementById('quizList').innerHTML=quiz.map((q,i)=>`<div class="quiz-card" data-q="${i}"><h3>${i+1}. ${q.q}</h3>${q.opts.map((o,j)=>`<button class="option" data-i="${j}">${o}</button>`).join('')}<div class="explain">${q.ex}</div></div>`).join('');document.querySelectorAll('.quiz-card').forEach(card=>card.querySelectorAll('.option').forEach(btn=>btn.onclick=()=>{if(card.classList.contains('answered'))return;card.classList.add('answered');const q=quiz[+card.dataset.q];card.querySelectorAll('.option').forEach((b,j)=>b.classList.add(j===q.ans?'correct':j===+btn.dataset.i?'wrong':''))}))}
document.getElementById('searchInput').addEventListener('input',render);document.querySelectorAll('[data-level]').forEach(b=>b.onclick=()=>{active=b.dataset.level;document.querySelectorAll('[data-level]').forEach(x=>x.classList.toggle('active',x===b));render()});document.getElementById('expandAll').onclick=()=>{const cards=[...document.querySelectorAll('.card')];const open=cards.some(x=>!x.open);cards.forEach(x=>x.open=open);document.getElementById('expandAll').textContent=open?'全部收起':'全部展开'};document.getElementById('flashcard').onclick=()=>document.getElementById('flashcard').classList.toggle('flipped');document.getElementById('prevFlash').onclick=()=>{flashIndex=(flashIndex-1+flashcards.length)%flashcards.length;renderFlash()};document.getElementById('nextFlash').onclick=()=>{flashIndex=(flashIndex+1)%flashcards.length;renderFlash()};document.getElementById('shuffleFlash').onclick=()=>{flashIndex=Math.floor(Math.random()*flashcards.length);renderFlash()};renderToc();render();renderFlash();renderQuiz();
</script>
</body>
</html>
