ster button{padding:9px 13px;border:1px solid var(--line);border-radius:10px;background:#fff;cursor:pointer}.master button.done{color:#fff;background:var(--ok);border-color:var(--ok)}
.lab{display:grid;grid-template-columns:280px 1fr;gap:16px}.lab-menu{display:grid;gap:8px}.lab-menu button{padding:12px;text-align:left;border:1px solid var(--line);border-radius:12px;background:#fff;cursor:pointer}.lab-menu button.active{color:#fff;background:var(--accent);border-color:var(--accent)}.lab-result{padding:20px;border:1px solid var(--line);border-radius:18px;background:#fff}.timeline{display:grid;gap:9px;margin-top:12px}.step{display:grid;grid-template-columns:30px 1fr;gap:10px;align-items:start}.num{display:grid;place-items:center;width:28px;height:28px;border-radius:50%;color:#fff;background:var(--accent);font-weight:850}.step b{display:block}.step p{margin:2px 0;color:var(--muted)}
.flash{display:grid;grid-template-columns:1fr 1fr;gap:16px}.flashcard{min-height:230px;perspective:1000px;cursor:pointer}.inner{position:relative;min-height:230px;transform-style:preserve-3d;transition:.55s}.flashcard.flip .inner{transform:rotateY(180deg)}.face{position:absolute;inset:0;padding:24px;border:1px solid var(--line);border-radius:20px;background:#fff;box-shadow:var(--shadow);backface-visibility:hidden}.backface{transform:rotateY(180deg);background:linear-gradient(145deg,#fff1ef,#fff)}.face small{color:var(--muted)}.ops{padding:22px;border:1px solid var(--line);border-radius:20px;background:#fff}.ops button{margin:5px;padding:8px 11px;border:1px solid var(--line);border-radius:10px;background:#fff;cursor:pointer}.quiz{padding:20px;border:1px solid var(--line);border-radius:18px;background:#fff}.option{display:block;width:100%;margin:8px 0;padding:11px;text-align:left;border:1px solid var(--line);border-radius:11px;background:#fff;cursor:pointer}.option.correct{border-color:var(--ok);background:#eff9f3}.option.wrong{border-color:var(--accent);background:#fff0ee}.explain{display:none;color:var(--muted)}.quiz.answered .explain{display:block}.empty{display:none;padding:26px;text-align:center;border:1px dashed var(--line);border-radius:18px;color:var(--muted)}
@media(max-width:920px){.hero-grid,.layout,.lab{grid-template-columns:1fr}.side{position:static}.grid2,.flash{grid-template-columns:1fr}.full{grid-column:auto}}@media(max-width:600px){.shell{width:min(100% - 16px,1200px)}.controls{position:static}.search{grid-template-columns:1fr}.metrics{grid-template-columns:1fr 1fr}.hero{border-radius:22px}}

<script>
const topics=[
{id:'fast',cat:'structure',title:'Redis 为什么快：内存、事件循环与高效结构',level:'core',tags:['单线程','IO 多路复用','内存'],summary:'核心命令执行主要在内存中，事件循环避免线程切换，高效编码减少内存和 CPU 开销。',points:['大部分读写直接操作内存。','主线程串行执行命令，避免共享数据结构锁竞争。','使用 epoll/kqueue 等 IO 多路复用处理大量连接。','真正慢点常来自大 Key、复杂命令、网络、持久化和主从同步。'],code:`# 排查延迟\nredis-cli --latency\nredis-cli --latency-history\nSLOWLOG GET 20`,qa:'Redis 单线程为什么还能高并发？',answer:'网络连接由 IO 多路复用统一监听，命令执行短且以内存操作为主；单线程避免锁竞争和上下文切换。Redis 也并非所有工作都单线程，持久化、异步释放、网络 IO 等可有后台线程。',trap:'不要说 Redis 完全单线程，也不要说单线程永远不会阻塞。'},
{id:'string',cat:'structure',title:'String：最常用类型与 SDS',level:'core',tags:['String','SDS','计数器'],summary:'String 可存字符串、整数、二进制，底层常使用 SDS，支持 O(1) 获取长度和安全扩容。',points:['可用于缓存对象、计数器、分布式锁 token。','SDS 记录长度，不依赖 \0，支持二进制安全。','INCR 原子执行，适合计数。','大 value 会增加网络、复制和持久化压力。'],code:`SET user:1 '{"name":"A"}' EX 300\nINCR article:1:view\nMGET user:1 user:2`,qa:'为什么 Redis 不直接使用 C 字符串？',answer:'SDS 保存长度、容量等元数据，获取长度 O(1)，二进制安全，并能通过预分配减少频繁扩容。',trap:'String 最大能力不等于建议塞超大 JSON；大 value 会形成大 Key。'},
{id:'collections',cat:'structure',title:'List / Hash / Set：业务模型如何选',level:'core',tags:['List','Hash','Set'],summary:'List 是有序序列，Hash 是字段映射，Set 是无序去重集合；选型先看访问模式。',points:['List 适合简单队列、时间线，但阻塞队列和可靠消息更建议专用 MQ。','Hash 适合局部字段读写，避免整对象序列化。','Set 适合去重、共同关注、标签集合。','小集合常使用紧凑编码，规模扩大后转换为通用结构。'],code:`HSET user:1 name Alice age 27\nSADD article:1:tags redis java\nSINTER user:a:follows user:b:follows`,qa:'Hash 比把整个对象存 JSON 好在哪里？',answer:'可局部读写字段，减少序列化和网络传输；但复杂嵌套对象或整体读取场景未必更合适。',trap:'不要用 List 当可靠消息队列替代 MQ，缺少确认、重试、消费组等完整语义。'},
{id:'zset',cat:'structure',title:'ZSet 与跳表：排行榜为什么快',level:'interview',tags:['ZSet','跳表','排行榜'],summary:'ZSet 同时维护成员去重和按 score 排序，典型实现结合字典与跳表。',points:['字典用于 O(1) 找成员分数。','跳表用于范围查询和有序遍历。','增加层级用概率换取近似平衡。','排行榜、延时任务索引常用 ZSet。'],code:`ZADD rank 99 userA 88 userB\nZREVRANGE rank 0 9 WITHSCORES\nZRANGEBYSCORE delay 0 1710000000`,qa:'为什么 Redis 用跳表而不是红黑树？',answer:'跳表实现简单、范围遍历自然、插入删除性能稳定，且容易通过层级定位；配合字典可以同时满足成员查找和有序范围查询。',trap:'ZSet 顺序由 score 决定，同分时还会按成员字典序处理。'},
{id:'expire',cat:'cache',title:'过期删除：惰性删除 + 定期删除',level:'interview',tags:['TTL','过期删除'],summary:'Redis 不会为每个 Key 创建定时器，而是访问时检查过期，并周期性抽样清理。',points:['惰性删除：访问 Key 时发现过期再删除。','定期删除：周期性抽样过期字典。','两者平衡 CPU 与内存。','过期 Key 太集中会造成抖动，TTL 应增加随机量。'],code:`SET cache:key value EX 300\nTTL cache:key\nEXPIRE cache:key 600`,qa:'为什么不精确地到期即删除？',answer:'为每个 Key 管理定时器成本太高。惰性加定期删除在 CPU 与内存之间做折中。',trap:'逻辑过期不等于物理立即删除，读取语义上不可见但清理可能稍后发生。'},
{id:'eviction',cat:'cache',title:'内存淘汰策略：过期与淘汰不是一回事',level:'interview',tags:['LRU','LFU','maxmemory'],summary:'过期删除处理 TTL；内存淘汰在达到 maxmemory 时决定删除哪些 Key。',points:['noeviction：拒绝写入。','allkeys-lru / volatile-lru：近似 LRU。','allkeys-lfu：按访问频率近似淘汰。','random、ttl 等策略适合特定场景。','策略必须结合缓存命中率和业务价值。'],code:`CONFIG GET maxmemory-policy\nINFO memory`,qa:'Redis 的 LRU 是严格 LRU 吗？',answer:'通常是近似 LRU，通过采样候选 Key 选择较久未访问者，以更低成本换取接近效果。',trap:'volatile-* 只从设置了 TTL 的 Key 中淘汰，若大量 Key 无 TTL 可能无法释放。'},
{id:'rdb',cat:'storage',title:'RDB：快照、fork 与写时复制',level:'interview',tags:['RDB','fork','COW'],summary:'RDB 在某个时点生成全量快照，恢复快、文件紧凑，但可能丢失最近一次快照后的数据。',points:['BGSAVE fork 子进程生成快照。','父子进程通过写时复制共享内存页。','写入越多，COW 额外内存越大。','fork 大实例可能造成延迟抖动。'],code:`BGSAVE\nLASTSAVE\nINFO persistence`,qa:'BGSAVE 为什么可能导致内存突然升高？',answer:'fork 后父子共享页面；父进程继续写时触发 COW，修改页面被复制，写流量越大额外内存越明显。',trap:'RDB 不代表完全不阻塞，fork 和磁盘 IO 仍可能带来延迟。'},
{id:'aof',cat:'storage',title:'AOF：追加日志、fsync 与重写',level:'interview',tags:['AOF','fsync','rewrite'],summary:'AOF 记录写命令，数据更完整；通过重写压缩历史命令。',points:['always 最安全但慢；everysec 常见折中；no 交给 OS。','AOF 重写根据当前数据生成最小命令集。','重写期间新增命令进入缓冲，最后合并。','AOF 文件通常比 RDB 大，恢复更慢。'],code:`CONFIG GET appendonly\nCONFIG GET appendfsync\nBGREWRITEAOF`,qa:'AOF everysec 最多可能丢多久数据？',answer:'理论上通常约 1 秒窗口，但实际还受系统调度和 IO 状况影响。',trap:'AOF 不是每次写都直接刷盘，取决于 appendfsync 策略。'},
{id:'replication',cat:'ha',title:'主从复制：全量、增量与复制延迟',level:'interview',tags:['主从复制','PSYNC','复制延迟'],summary:'从节点先尝试部分重同步，条件不满足时进行全量同步；异步复制意味着存在延迟。',points:['全量同步涉及 RDB 生成、传输和加载。','增量同步依赖 replication backlog 和 offset。','网络中断时间过长导致 backlog 覆盖，会退化为全量。','关键读不能盲目走从库。'],code:`INFO replication\nROLE`,qa:'主节点写成功，从节点一定马上有吗？',answer:'不一定。复制通常异步，存在网络、执行和积压延迟；强一致读应走主节点或设计等待确认机制。',trap:'主从复制解决读扩展和副本，不自动解决主节点故障选主。'},
{id:'sentinel',cat:'ha',title:'Sentinel：监控、主观下线、客观下线与故障转移',level:'interview',tags:['Sentinel','故障转移'],summary:'哨兵负责监控主从、判断故障、选举 leader 并完成主从切换。',points:['单个哨兵判断为主观下线。','达到 quorum 后形成客观下线判断。','哨兵之间选举 leader 执行故障转移。','客户端需能发现新主节点。'],code:`SENTINEL masters\nSENTINEL get-master-addr-by-name mymaster`,qa:'quorum 和 majority 有什么区别？',answer:'quorum 用于判断主节点客观下线；真正发起故障转移还需要哨兵 leader 获得多数派授权。',trap:'切换期间可能存在短暂不可用和数据丢失窗口，因为复制通常异步。'},
{id:'cluster',cat:'ha',title:'Redis Cluster：16384 槽、MOVED 与 ASK',level:'deep',tags:['Cluster','slot','MOVED','ASK'],summary:'Cluster 用槽把 Key 分布到多个主节点，实现水平扩展；客户端根据槽路由。',points:['slot = CRC16(key) mod 16384。','Hash Tag 可让多个 Key 落同一槽，如 order:{1}:a。','MOVED 表示槽稳定迁移到其他节点。','ASK 表示槽迁移过程中的临时访问。','跨槽多 Key 操作受限。'],code:`CLUSTER KEYSLOT order:{1}:detail\nCLUSTER NODES`,qa:'为什么是槽而不是直接对节点取模？',answer:'槽提供中间映射层，扩缩容时只迁移槽，不需要整体改变所有 Key 的映射规则。',trap:'Cluster 不是自动强一致系统，故障切换仍可能丢失少量未复制数据。'},
{id:'penetration',cat:'cache',title:'缓存穿透：请求不存在的数据',level:'core',tags:['缓存穿透','BloomFilter','空值缓存'],summary:'大量请求查询不存在的 Key，缓存永远不命中，流量直接打到数据库。',points:['缓存空值并设置较短 TTL。','使用 Bloom Filter 在入口判断大概率不存在。','校验非法参数和恶意请求。','Bloom Filter 有误判但无漏判：可能把不存在判断为存在。'],code:`value = redis.get(key)\nif value is None:\n    value = db.query(key)\n    redis.setex(key, 60, value or 'NULL')`,qa:'Bloom Filter 为什么有误判？',answer:'多个元素的位可能重叠，新查询的多个位都恰好为 1，导致误认为可能存在；但已插入元素对应位一定被设置，因此通常不会漏判。',trap:'空值缓存 TTL 不宜过长，否则真实数据创建后可能短期看不到。'},
{id:'breakdown',cat:'cache',title:'缓存击穿：热点 Key 瞬间失效',level:'core',tags:['缓存击穿','互斥锁','逻辑过期'],summary:'单个热点 Key 到期，大量并发同时回源数据库。',points:['互斥锁：只让一个请求重建，其余等待或返回旧值。','逻辑过期：物理不删除，发现过期后异步刷新。','热点 Key 可提前续期或永不过期并由业务主动更新。'],code:`if cache miss:\n  if SET lock NX EX 10:\n    load DB and rebuild\n  else:\n    sleep/backoff or return stale`,qa:'互斥锁重建缓存有什么风险？',answer:'锁过期、构建时间过长、锁持有者失败会导致重复重建或等待；需要合理超时、token 校验和降级策略。',trap:'击穿是单个热点 Key，雪崩是大量 Key 或缓存整体同时失效。'},
{id:'avalanche',cat:'cache',title:'缓存雪崩：大量 Key 同时失效或 Redis 不可用',level:'core',tags:['缓存雪崩','随机 TTL','限流降级'],summary:'大量缓存同一时刻失效，或缓存集群故障，大量流量涌向数据库。',points:['TTL 加随机抖动。','热点数据预热和分批刷新。','限流、熔断、降级保护数据库。','Redis 高可用与多级缓存。','数据库也要有容量和慢查询治理。'],code:`ttl = base_ttl + random.randint(0, jitter)`,qa:'雪崩和击穿如何快速区分？',answer:'击穿聚焦单个热点 Key；雪崩是大量 Key 同时失效或缓存系统整体不可用。',trap:'只加随机 TTL 无法解决 Redis 集群整体故障。'},
{id:'consistency',cat:'cache',title:'缓存一致性：数据库为准，写后删缓存',level:'interview',tags:['一致性','Cache Aside','延迟双删'],summary:'常用 Cache Aside：读缓存，未命中查 DB 回填；写数据库后删除缓存。',points:['先更新 DB，再删除缓存，降低旧值回填窗口。','删除应在事务提交后执行。','删除失败要重试、消息补偿或监听 binlog。','TTL 是兜底，不是完整一致性方案。','强一致场景可能不适合缓存。'],code:`update DB\nafter commit -> DEL cache:key\nif failed -> retry queue / CDC`,qa:'为什么不直接同时更新 DB 和缓存？',answer:'双写存在部分失败和并发覆盖问题；删除缓存更简单，让下一次读取从 DB 重建。',trap:'延迟双删不是银弹，延迟时间难精确，仍需重试、版本和监控。'},
{id:'lock',cat:'cache',title:'分布式锁：SET NX PX、token 与续期',level:'interview',tags:['分布式锁','Redisson','Lua'],summary:'加锁要原子、解锁要校验所有者、业务超时要处理续期；锁只提供互斥，不自动保证业务正确。',points:['SET key token NX PX ttl 原子加锁。','解锁用 Lua 比较 token 后删除。','业务执行超过 TTL 需要续期或选择足够超时。','锁失效后旧持有者继续执行，可考虑 fencing token。','数据库唯一约束仍应兜底关键一致性。'],code:`if redis.call('get', KEYS[1]) == ARGV[1] then\n  return redis.call('del', KEYS[1])\nelse return 0 end`,qa:'为什么解锁不能直接 DEL？',answer:'锁可能已过期并被其他线程重新获得，直接 DEL 会删除别人的锁。必须比较唯一 token。',trap:'Redis 锁不能替代业务幂等、唯一索引和状态机。'},
{id:'transaction',cat:'structure',title:'事务、Lua 与原子性',level:'deep',tags:['MULTI','WATCH','Lua'],summary:'Redis 单条命令原子；MULTI/EXEC 批量顺序执行但不提供数据库式回滚；Lua 可把多步逻辑原子执行。',points:['MULTI 后命令入队，EXEC 时连续执行。','运行期某条命令失败，其他命令通常仍会执行。','WATCH 提供乐观锁。','Lua 执行期间阻塞主线程，脚本必须短。'],code:`WATCH balance\nMULTI\nDECRBY balance 10\nEXEC`,qa:'Redis 事务为什么没有完整回滚？',answer:'设计目标是简单高性能，命令错误通常应在执行前校验；Redis 不维护复杂 undo log。',trap:'Lua 原子不代表可以执行长任务，长脚本会阻塞所有客户端。'},
{id:'big-hot',cat:'practice',title:'大 Key、热 Key 与线上抖动',level:'interview',tags:['大 Key','热 Key','延迟'],summary:'大 Key 影响网络、删除、复制和持久化；热 Key 让单节点或单分片成为热点。',points:['大 Key：拆分、压缩、异步 UNLINK、渐进删除。','热 Key：本地缓存、多副本读、Key 拆分、请求合并。','监控命令耗时、网络流量、内存和访问频率。','避免线上 KEYS *，使用 SCAN。'],code:`redis-cli --bigkeys\nMEMORY USAGE key\nUNLINK big:key\nSCAN 0 MATCH prefix:* COUNT 100`,qa:'DEL 大 Key 为什么危险？',answer:'删除复杂结构需要释放大量元素，可能长时间阻塞主线程；UNLINK 可把内存释放放到后台线程。',trap:'--bigkeys 是采样扫描，生产环境仍要评估扫描开销。'},
{id:'ops',cat:'practice',title:'Redis 线上排障 SOP',level:'interview',tags:['SLOWLOG','INFO','排障'],summary:'先区分客户端、网络、命令、内存、持久化、复制和系统资源，再逐层定位。',points:['看 INFO commandstats、memory、persistence、replication。','看 SLOWLOG 与 latency doctor。','排查大 Key、热 Key、连接数、阻塞客户端。','关注 fork、AOF rewrite、swap、CPU steal、网络抖动。','结合业务时间点和变更记录。'],code:`INFO all\nSLOWLOG GET 20\nLATENCY DOCTOR\nCLIENT LIST\nMEMORY STATS`,qa:'Redis 突然变慢你怎么排？',answer:'先确认范围和时间点，再看慢日志、命令统计、CPU/内存/网络、持久化 fork/AOF、主从状态、大 Key 热 Key和客户端连接，最后结合业务变更复现。',trap:'不要一上来重启 Redis，先保留现场和指标证据。'}
];

let cat='all',fi=0,li=0;const key='redis-mastered-v1';let mastered=new Set(JSON.parse(localStorage.getItem(key)||'[]'));
const esc=s=>s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function render(){const kw=document.getElementById('search').value.trim().toLowerCase();const rows=topics.filter(t=>(cat==='all'||t.cat===cat)&&[t.title,t.summary,t.qa,...t.tags].join(' ').toLowerCase().includes(kw));document.getElementById('cards').innerHTML=rows.map(t=>`<details class="card" id="${t.id}"><summary><div class="sum"><div><h3>${t.title}</h3><div class="tags"><span class="tag ${t.level==='deep'?'deep':''}">${t.level==='deep'?'深入追问':t.level==='interview'?'面试高频':'核心必会'}</span>${t.tags.map(x=>`<span class="tag">${x}</span>`).join('')}</div><p class="sub">${t.summary}</p></div><span class="chev">›</span></div></summary><div class="body"><div class="grid2"><div class="box"><h4>原理拆解</h4><ul>${t.points.map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="box"><h4>命令 / 代码</h4><pre>${esc(t.code)}</pre></div><div class="box full interview"><h4>面试官：${t.qa}</h4><p>${t.answer}</p></div><div class="box full warn"><h4>易错点</h4><p>${t.trap}</p></div></div><div class="master"><button data-id="${t.id}" class="${mastered.has(t.id)?'done':''}">${mastered.has(t.id)?'✓ 已掌握':'标记掌握'}</button></div></div></details>`).join('');document.getElementById('result').textContent=`${rows.length} 张知识卡`;document.getElementById('empty').style.display=rows.length?'none':'block';document.querySelectorAll('.master button').forEach(b=>b.onclick=()=>{mastered.has(b.dataset.id)?mastered.delete(b.dataset.id):mastered.add(b.dataset.id);localStorage.setItem(key,JSON.stringify([...mastered]));render()});stats()}
function stats(){document.getElementById('count').textContent=topics.length;document.getElementById('done').textContent=mastered.size;document.getElementById('progress').textContent=`掌握进度 ${Math.round(mastered.size/topics.length*100)}%`}
function toc(){document.getElementById('toc').innerHTML=topics.map(t=>`<a href="#${t.id}">${t.title}</a>`).join('')}
function renderLab(){document.getElementById('labMenu').innerHTML=labs.map((x,i)=>`<button class="${i===li?'active':''}" data-i="${i}">${x.name}</button>`).join('');const x=labs[li];document.getElementById('labTitle').textContent=x.name;document.getElementById('labDesc').textContent=x.desc;document.getElementById('labSteps').innerHTML=x.steps.map((s,i)=>`<div class="step"><span class="num">${i+1}</span><div><b>${['确认现象','定位根因','实施方案','验证与预防'][i]}</b><p>${s}</p></div></div>`).join('');document.querySelectorAll('#labMenu button').forEach(b=>b.onclick=()=>{li=+b.dataset.i;renderLab()})}
const flash=topics.map(t=>({q:t.qa,a:t.answer,t:t.summary}));function renderFlash(){const x=flash[fi];fq.textContent=x.q;fa.textContent=x.a;ft.textContent=x.t;document.getElementById('fi').textContent=`${fi+1} / ${flash.length}`;flashcard.classList.remove('flip')}
function renderQuiz(){quizList.innerHTML=quiz.map((q,i)=>`<div class="quiz" data-i="${i}"><h3>${i+1}. ${q.q}</h3>${q.o.map((x,j)=>`<button class="option" data-j="${j}">${x}</button>`).join('')}<p class="explain">${q.e}</p></div>`).join('');document.querySelectorAll('.quiz').forEach(c=>c.querySelectorAll('.option').forEach(b=>b.onclick=()=>{if(c.classList.contains('answered'))return;c.classList.add('answered');const q=quiz[+c.dataset.i];c.querySelectorAll('.option').forEach((x,j)=>x.classList.add(j===q.a?'correct':j===+b.dataset.j?'wrong':''))}))}
document.getElementById('search').oninput=render;document.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>{cat=b.dataset.cat;document.querySelectorAll('[data-cat]').forEach(x=>x.classList.toggle('active',x===b));render()});expand.onclick=()=>{const a=[...document.querySelectorAll('.card')],o=a.some(x=>!x.open);a.forEach(x=>x.open=o);expand.textContent=o?'全部收起':'全部展开'};flashcard.onclick=()=>flashcard.classList.toggle('flip');prev.onclick=()=>{fi=(fi-1+flash.length)%flash.length;renderFlash()};next.onclick=()=>{fi=(fi+1)%flash.length;renderFlash()};random.onclick=()=>{fi=Math.floor(Math.random()*flash.length);renderFlash()};toc();render();renderLab();renderFlash();renderQuiz();
</script></body></html>
